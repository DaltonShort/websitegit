<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      var segmentCount = 1; // For base path '/websitegit/'
      var l = window.location;
      var pathArray = l.pathname.split('/');
      var redirectPath = pathArray.slice(0, segmentCount + 1).join('/') + '/';
      if (pathArray.length > segmentCount + 1) {
        redirectPath += '?/' + pathArray.slice(segmentCount + 1).join('/').replace(/&/g, '~and~');
      }
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + redirectPath + l.search.replace(/&/g, '~and~') + l.hash);
    </script>
  </head>
  <body>
  </body>
</html>
